<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎮 Caro Online 15x15</title>

<style>

body{
margin:0;
background:#0f172a;
color:white;
font-family:Arial,sans-serif;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

h1{
margin-bottom:10px;
}

#status{
font-size:22px;
margin-bottom:15px;
}

#roomInfo{
margin:10px;
font-size:18px;
color:#22c55e;
}

.board{
display:grid;
grid-template-columns:repeat(15,40px);
gap:2px;
margin-top:20px;
}

.cell{
width:40px;
height:40px;
background:#1e293b;
border:1px solid #334155;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
font-weight:bold;
cursor:pointer;
user-select:none;
}

.cell:hover{
background:#334155;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
cursor:pointer;
margin:5px;
}

.createBtn{
background:#22c55e;
color:white;
}

.joinBtn{
background:#3b82f6;
color:white;
}

.homeBtn{
background:#ef4444;
color:white;
}

input{
padding:10px;
border-radius:8px;
border:none;
width:180px;
text-transform:uppercase;
}

</style>
</head>

<body>

<h1>❌⭕ CARO ONLINE</h1>

<div id="status">
Đăng nhập...
</div>

<div>

<button
class="createBtn"
onclick="createRoom()">
🎯 Tạo phòng
</button>

<input
id="roomInput"
placeholder="Mã phòng">

<button
class="joinBtn"
onclick="joinRoom()">
🚪 Vào phòng
</button>

</div>

<div id="roomInfo"></div>

<div id="board" class="board"></div>

<button
class="homeBtn"
onclick="location.href='home.html'">
🏠 Về Game Hub
</button>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
updateDoc,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyA4uQqg-Akwqm6F3PfxUrnXY_UNCvIVsxo",
authDomain: "my-login-app-8cd0a.firebaseapp.com",
projectId: "my-login-app-8cd0a",
storageBucket: "my-login-app-8cd0a.firebasestorage.app",
messagingSenderId: "963802399528",
appId: "1:963802399528:web:5deb03e885033c9443461d"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

const SIZE = 15;

let currentUser = null;

let roomId = null;

let mySymbol = "";

let currentTurn = "X";

let boardData =
Array(SIZE)
.fill()
.map(() =>
Array(SIZE).fill("")
);

const board =
document.getElementById("board");

const statusText =
document.getElementById("status");

const roomInfo =
document.getElementById("roomInfo");

onAuthStateChanged(
auth,
(user)=>{

if(!user){

location.href="index.html";
return;

}

currentUser = user;

statusText.innerText =
"🎮 Tạo hoặc vào phòng";

}
);

function generateRoomId(){

return Math.random()
.toString(36)
.substring(2,8)
.toUpperCase();

}

function createBoard(){

board.innerHTML = "";

for(let y=0;y<SIZE;y++){

for(let x=0;x<SIZE;x++){

const cell =
document.createElement("div");

cell.className =
"cell";

cell.innerText =
boardData[y][x];

cell.addEventListener(
"click",
()=>playMove(x,y)
);

board.appendChild(cell);

}

}

}

createBoard();

window.createRoom =
async ()=>{

if(!currentUser){

alert("Chưa đăng nhập");
return;

}

roomId =
generateRoomId();

mySymbol = "X";

await setDoc(
doc(db,"rooms",roomId),
{
hostUid:
currentUser.uid,

guestUid:
"",

turn:
"X",

winner:
"",

board:
boardData
}
);

roomInfo.innerText =
"🎉 Mã phòng: "
+ roomId;

statusText.innerText =
"⌛ Đang chờ đối thủ";

listenRoom();

};

window.joinRoom =
async ()=>{

const id =
document.getElementById("roomInput")
.value
.trim()
.toUpperCase();

if(!id){
return;
}

const roomRef =
doc(db,"rooms",id);

const roomSnap =
await getDoc(roomRef);

if(!roomSnap.exists()){

alert("Không tìm thấy phòng");
return;

}

await updateDoc(
roomRef,
{
guestUid:
currentUser.uid
}
);

roomId = id;

mySymbol = "O";

roomInfo.innerText =
"🎉 Đã vào phòng: "
+ roomId;

listenRoom();

};

function listenRoom(){

const roomRef =
doc(db,"rooms",roomId);

onSnapshot(
roomRef,
(snapshot)=>{

if(!snapshot.exists())
return;

const data =
snapshot.data();

boardData =
data.board;

currentTurn =
data.turn;

createBoard();

if(data.winner){

statusText.innerText =
"🏆 Người thắng: "
+ data.winner;

return;

}

if(currentTurn === mySymbol){

statusText.innerText =
"👉 Tới lượt bạn ("+
mySymbol+")";

}else{

statusText.innerText =
"⏳ Đợi đối thủ";

}
function checkWinner(board,x,y,symbol){

const directions = [

[1,0],
[0,1],
[1,1],
[1,-1]

];

for(const [dx,dy] of directions){

let count = 1;

let nx = x + dx;
let ny = y + dy;

while(
nx >= 0 &&
ny >= 0 &&
nx < SIZE &&
ny < SIZE &&
board[ny][nx] === symbol
){

count++;
nx += dx;
ny += dy;

}

nx = x - dx;
ny = y - dy;

while(
nx >= 0 &&
ny >= 0 &&
nx < SIZE &&
ny < SIZE &&
board[ny][nx] === symbol
){

count++;
nx -= dx;
ny -= dy;

}

if(count >= 5){
return true;
}

}

return false;

}

async function playMove(x,y){

if(!roomId) return;

if(currentTurn !== mySymbol)
return;

if(boardData[y][x] !== "")
return;

boardData[y][x] = mySymbol;

let winner = "";

if(
checkWinner(
boardData,
x,
y,
mySymbol
)
){

winner = mySymbol;

}

const nextTurn =
mySymbol === "X"
? "O"
: "X";

await updateDoc(
doc(db,"rooms",roomId),
{
board: boardData,
turn: nextTurn,
winner: winner
}
);

}

window.resetRoom =
async ()=>{

if(!roomId)
return;

boardData =
Array(SIZE)
.fill()
.map(()=>
Array(SIZE)
.fill("")
);

await updateDoc(
doc(db,"rooms",roomId),
{
board: boardData,
turn: "X",
winner: ""
}
);

};

</script>

</body>
</html>
