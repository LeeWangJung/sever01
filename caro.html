<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❌⭕ Cờ Caro</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial,sans-serif;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

h1{
margin-bottom:10px;
}

#status{
font-size:22px;
margin-bottom:20px;
}

.board{
display:grid;
grid-template-columns:repeat(3,100px);
gap:5px;
}

.cell{
width:100px;
height:100px;
background:#1e293b;
border:2px solid #22c55e;
display:flex;
justify-content:center;
align-items:center;
font-size:50px;
cursor:pointer;
}

.cell:hover{
background:#334155;
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:10px;
cursor:pointer;
color:white;
}

.reset{
background:#22c55e;
}

.home{
background:#ef4444;
}
</style>

</head>

<body>

<h1>❌⭕ CỜ CARO</h1>

<div id="status">
Lượt: X
</div>

<div class="board" id="board"></div>

<button class="reset" onclick="resetGame()">
🔄 Chơi lại
</button>
<h2>🎮 CARO ONLINE</h2>

<button onclick="createRoom()">
🎯 Tạo phòng
</button>

<br><br>

<input
id="roomInput"
placeholder="Nhập mã phòng">

<button onclick="joinRoom()">
🚪 Vào phòng
</button>

<p id="roomInfo"></p>
<button
class="home"
onclick="location.href='home.html'">
🏠 Về Game Hub </button>

<script type="module">
  import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
setDoc
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";
const firebaseConfig = {
apiKey: "AIzaSyA4uQqg-Akwqm6F3PfxUrnXY_UNCvIVsxo",
authDomain: "my-login-app-8cd0a.firebaseapp.com",
projectId: "my-login-app-8cd0a",
storageBucket: "my-login-app-8cd0a.firebasestorage.app",
messagingSenderId: "963802399528",
appId: "1:963802399528:web:5deb03e885033c9443461d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

onAuthStateChanged(auth,(user)=>{

if(user){
currentUser = user;
}else{
location.href = "index.html";
}

});
  function generateRoomId(){

return Math.random()
.toString(36)
.substring(2,8)
.toUpperCase();

}

window.createRoom = async ()=>{

if(!currentUser){
alert("Chưa đăng nhập");
return;
}

const roomId = generateRoomId();

await setDoc(
doc(db,"rooms",roomId),
{
hostUid: currentUser.uid,
guestUid: "",
status: "waiting",
createdAt: Date.now()
}
);

document.getElementById("roomInfo").innerText =
"🎉 Mã phòng: " + roomId;

};

window.joinRoom = async ()=>{

const roomId =
document.getElementById("roomInput")
.value
.trim()
.toUpperCase();

if(!roomId){
return;
}

const roomSnap =
await getDoc(
doc(db,"rooms",roomId)
);

if(!roomSnap.exists()){

alert("Không tìm thấy phòng");
return;

}

alert("Đã vào phòng!");

};
const board = document.getElementById("board");

const statusText =
document.getElementById("status");

let currentPlayer = "X";

let gameActive = true;

let cells =
["","","","","","","","",""];

const winPatterns = [

[0,1,2],
[3,4,5],
[6,7,8],

[0,3,6],
[1,4,7],
[2,5,8],

[0,4,8],
[2,4,6]

];

function createBoard(){

board.innerHTML = "";

cells.forEach((cell,index)=>{

const div =
document.createElement("div");

div.classList.add("cell");

div.innerText = cell;

div.addEventListener(
"click",
()=>handleClick(index)
);

board.appendChild(div);

});

}

function handleClick(index){

if(
cells[index] !== "" ||
!gameActive
){
return;
}

cells[index] = currentPlayer;

createBoard();

checkWinner();

currentPlayer =
currentPlayer === "X"
? "O"
: "X";

if(gameActive){

statusText.innerText =
"Lượt: " + currentPlayer;

}

}

function checkWinner(){

for(let pattern of winPatterns){

const [a,b,c] = pattern;

if(
cells[a] &&
cells[a] === cells[b] &&
cells[a] === cells[c]
){

statusText.innerText =
"🎉 Người thắng: " +
cells[a];

gameActive = false;

return;

}

}

if(!cells.includes("")){

statusText.innerText =
"🤝 Hòa";

gameActive = false;

}

}

function resetGame(){

cells =
["","","","","","","","",""];

currentPlayer = "X";

gameActive = true;

statusText.innerText =
"Lượt: X";

createBoard();

}

createBoard();

</script>

</body>
</html>
