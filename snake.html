<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Rắn săn mồi</title>

<style>
body{
    margin:0;
    background:#111;
    display:flex;
    flex-direction:column;
    align-items:center;
    color:white;
    font-family:Arial;
}

canvas{
    background:black;
    margin-top:20px;
}

button{
    margin-top:15px;
    padding:10px 20px;
}
</style>

</head>
<body>

<h1>🐍 Rắn săn mồi</h1>

<p>Điểm: <span id="score">0</span></p>

<canvas id="game" width="400" height="400"></canvas>

<button onclick="location.href='home.html'">
Quay lại Game Hub
</button>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const box = 20;

let snake = [
    {x:200,y:200}
];

let food = {
    x:Math.floor(Math.random()*20)*box,
    y:Math.floor(Math.random()*20)*box
};

let score = 0;

let direction = "RIGHT";

document.addEventListener("keydown",(e)=>{

if(e.key==="ArrowUp" && direction!=="DOWN")
direction="UP";

if(e.key==="ArrowDown" && direction!=="UP")
direction="DOWN";

if(e.key==="ArrowLeft" && direction!=="RIGHT")
direction="LEFT";

if(e.key==="ArrowRight" && direction!=="LEFT")
direction="RIGHT";

});

function draw(){

ctx.fillStyle="black";
ctx.fillRect(0,0,400,400);

ctx.fillStyle="red";
ctx.fillRect(food.x,food.y,box,box);

for(let i=0;i<snake.length;i++){

ctx.fillStyle=
i===0 ? "lime":"green";

ctx.fillRect(
snake[i].x,
snake[i].y,
box,
box
);

}

let headX = snake[0].x;
let headY = snake[0].y;

if(direction==="UP") headY-=box;
if(direction==="DOWN") headY+=box;
if(direction==="LEFT") headX-=box;
if(direction==="RIGHT") headX+=box;

if(
headX<0 ||
headY<0 ||
headX>=400 ||
headY>=400
){
alert("Game Over!");
location.reload();
return;
}

for(let i=1;i<snake.length;i++){

if(
headX===snake[i].x &&
headY===snake[i].y
){
alert("Game Over!");
location.reload();
return;
}

}

let newHead={
x:headX,
y:headY
};

if(
headX===food.x &&
headY===food.y
){

score++;

document.getElementById("score")
.innerText=score;

food={
x:Math.floor(Math.random()*20)*box,
y:Math.floor(Math.random()*20)*box
};

}else{

snake.pop();

}

snake.unshift(newHead);

}

setInterval(draw,120);

</script>

</body>
</html>
