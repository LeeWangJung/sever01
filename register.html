<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng ký tài khoản</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.box{
    width:400px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}

.register{
    background:#28a745;
    color:white;
}

.back{
    background:#6c757d;
    color:white;
}

#msg{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="box">

<h2>Tạo tài khoản mới</h2>

<input
id="email"
type="email"
placeholder="Nhập email">

<input
id="password"
type="password"
placeholder="Nhập mật khẩu">

<input
id="confirmPassword"
type="password"
placeholder="Nhập lại mật khẩu">

<button
class="register"
id="registerBtn">
Đăng ký </button>

<button
class="back"
onclick="window.location.href='index.html'">
Quay lại đăng nhập </button>

<div id="msg"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA4uQqg-Akwqm6F3PfxUrnXY_UNCvIVsxo",
  authDomain: "my-login-app-8cd0a.firebaseapp.com",
  projectId: "my-login-app-8cd0a",
  storageBucket: "my-login-app-8cd0a.firebasestorage.app",
  messagingSenderId: "963802399528",
  appId: "1:963802399528:web:5deb03e885033c9443461d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const msg =
document.getElementById("msg");

document
.getElementById("registerBtn")
.addEventListener("click", async ()=>{

const email =
document.getElementById("email").value.trim();

const password =
document.getElementById("password").value;

const confirmPassword =
document.getElementById("confirmPassword").value;

if(!email || !password || !confirmPassword){

msg.style.color="red";

msg.innerText=
"Vui lòng nhập đầy đủ thông tin";

return;

}

if(password !== confirmPassword){

msg.style.color="red";

msg.innerText=
"Mật khẩu xác nhận không khớp";

return;

}

if(password.length < 6){

msg.style.color="red";

msg.innerText=
"Mật khẩu phải có ít nhất 6 ký tự";

return;

}

try{

await createUserWithEmailAndPassword(
auth,
email,
password
);

msg.style.color="green";

msg.innerText=
"Đăng ký thành công, đang chuyển hướng...";

setTimeout(()=>{

window.location.href="index.html";

},1500);

}catch(error){

msg.style.color="red";

if(error.code==="auth/email-already-in-use"){

msg.innerText=
"Email đã được sử dụng";

}else{

msg.innerText=
error.message;

}

}

});

</script>

</body>
</html>
