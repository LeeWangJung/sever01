<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

.game-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-top:30px;
}

.card{
    background:#222;
    border-radius:15px;
    padding:20px;
    text-align:center;
}

.card button{
    padding:10px 20px;
    cursor:pointer;
}

.logout{
    margin-top:20px;
}
</style>

</head>
<body>

<div class="container">

<h1>🎮 GAME HUB</h1>

<div class="game-grid">

<div class="card">
<h2>🐍 Rắn săn mồi</h2>
<p>Game mẫu đầu tiên</p>
<button onclick="location.href='snake.html'">
Chơi ngay
</button>
</div>

</div>

</div>

</body>
</html>
