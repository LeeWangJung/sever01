<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAME HUB</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#111827;
}

.user{
font-size:18px;
}

.logout{
padding:10px 15px;
border:none;
background:#ef4444;
color:white;
cursor:pointer;
border-radius:8px;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.title{
text-align:center;
margin-bottom:30px;
font-size:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
text-align:center;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h2{
margin-bottom:10px;
}

.card p{
margin-bottom:20px;
color:#cbd5e1;
}

.playBtn{
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
background:#22c55e;
color:white;
font-size:16px;
}

.coming{
background:#64748b;
}

.footer{
text-align:center;
margin-top:40px;
color:#94a3b8;
}

</style>

</head>
<body>

<div class="header">

<div class="user">
👤 <span id="userEmail">Đang tải...</span>
</div>

<button class="logout" onclick="logout()">
Đăng xuất
</button>

</div>

<div class="container">

<h1 class="title">
🎮 GAME HUB
</h1>

<div class="grid">

<div class="card">

<h2>🐍 Rắn săn mồi</h2>

<p>
Ăn mồi để tăng điểm và leo bảng xếp hạng.
</p>

<button
class="playBtn"
onclick="location.href='snake.html'">
Chơi ngay </button>

</div>

<div class="card">

<h2>🏆 Bảng xếp hạng</h2>

<p>
Xem người chơi có điểm cao nhất.
</p>

<button
class="playBtn coming">
Sắp ra mắt </button>

</div>

<div class="card">

<h2>🚀 Bắn máy bay</h2>

<p>
Game sẽ được bổ sung sau.
</p>

<button
class="playBtn coming">
Sắp ra mắt </button>

</div>

<div class="card">

<h2>❌⭕ Cờ caro</h2>

<p>
Chơi với bạn bè.
</p>

<button
class="playBtn coming">
Sắp ra mắt </button>

</div>

</div>

<div class="footer">
Game Hub by Lee Wang Jung
</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyA4uQqg-Akwqm6F3PfxUrnXY_UNCvIVsxo",
authDomain: "my-login-app-8cd0a.firebaseapp.com",
projectId: "my-login-app-8cd0a",
storageBucket: "my-login-app-8cd0a.firebasestorage.app",
messagingSenderId: "963802399528",
appId: "1:963802399528:web:5deb03e885033c9443461d"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("userEmail").innerText =
user.email;

}else{

window.location.href = "index.html";

}

});

window.logout = async ()=>{

await signOut(auth);

window.location.href="index.html";

};

</script>

</body>
</html>
