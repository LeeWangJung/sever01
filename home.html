<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Quản lý sinh viên</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

input{
padding:10px;
margin:5px;
}

button{
padding:10px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
}

th{
background:#007bff;
color:white;
}

</style>
</head>
<body>

<div class="container">

<h1>Quản lý sinh viên</h1>

<input id="name" placeholder="Họ tên">

<input id="class" placeholder="Lớp">

<button onclick="addStudent()">
Thêm
</button>

<table>

<thead>

<tr>
<th>Họ tên</th>
<th>Lớp</th>
<th>Xóa</th>
</tr>

</thead>

<tbody id="studentTable">
</tbody>

</table>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyA4uQqg-Akwqm6F3PfxUrnXY_UNCvIVsxo",

authDomain: "my-login-app-8cd0a.firebaseapp.com",

projectId: "my-login-app-8cd0a",

storageBucket: "my-login-app-8cd0a.firebasestorage.app",

messagingSenderId: "963802399528",

appId: "1:963802399528:web:5deb03e885033c9443461d"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.addStudent = async ()=>{

const name =
document.getElementById("name").value;

const className =
document.getElementById("class").value;

await addDoc(
collection(db,"students"),
{
name:name,
className:className
}
);

loadStudents();

};

async function loadStudents(){

const table =
document.getElementById("studentTable");

table.innerHTML="";

const querySnapshot =
await getDocs(
collection(db,"students")
);

querySnapshot.forEach((student)=>{

const data = student.data();

table.innerHTML += `
<tr>
<td>${data.name}</td>
<td>${data.className}</td>
<td>
<button onclick="removeStudent('${student.id}')">
Xóa
</button>
</td>
</tr>
`;

});

}

window.removeStudent =
async(id)=>{

await deleteDoc(
doc(db,"students",id)
);

loadStudents();

};

loadStudents();

</script>

</body>
</html>
