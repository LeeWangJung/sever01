<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập hệ thống</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.box{
    width:400px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}

.login{
    background:#007bff;
    color:white;
}

.register{
    background:#28a745;
    color:white;
}

.reset{
    background:#ff9800;
    color:white;
}

#msg{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="box">

<h2>Đăng nhập hệ thống</h2>

<input
id="email"
type="email"
placeholder="Nhập email">

<input
id="password"
type="password"
placeholder="Nhập mật khẩu">

<button
class="login"
id="loginBtn">
Đăng nhập </button>

<button
class="register"
onclick="window.location.href='register.html'">
Đăng ký tài khoản </button>

<button
class="reset"
id="resetBtn">
Quên mật khẩu </button>

<div id="msg"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
sendPasswordResetEmail
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA4uQqg-Akwqm6F3PfxUrnXY_UNCvIVsxo",
  authDomain: "my-login-app-8cd0a.firebaseapp.com",
  projectId: "my-login-app-8cd0a",
  storageBucket: "my-login-app-8cd0a.firebasestorage.app",
  messagingSenderId: "963802399528",
  appId: "1:963802399528:web:5deb03e885033c9443461d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const emailInput =
document.getElementById("email");

const passwordInput =
document.getElementById("password");

const msg =
document.getElementById("msg");

document
.getElementById("loginBtn")
.addEventListener("click", async ()=>{

try{

await signInWithEmailAndPassword(
auth,
emailInput.value.trim(),
passwordInput.value
);

window.location.href="home.html";

}catch(error){

msg.style.color="red";

msg.innerText=
"Email hoặc mật khẩu không đúng";

}

});

document
.getElementById("resetBtn")
.addEventListener("click", async ()=>{

const email =
emailInput.value.trim();

if(!email){

msg.style.color="red";

msg.innerText=
"Vui lòng nhập email";

return;

}

try{

await sendPasswordResetEmail(
auth,
email
);

msg.style.color="green";

msg.innerText=
"Đã gửi email đặt lại mật khẩu";

}catch(error){

msg.style.color="red";

msg.innerText=
error.message;

}

});

</script>

</body>
</html>
